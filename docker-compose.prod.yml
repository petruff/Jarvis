version: '3.9'

services:
  jarvis-postgres:
    image: postgres:15-alpine
    container_name: jarvis-postgres-prod
    environment:
      POSTGRES_USER: jarvis
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: jarvis
    ports:
      - "5432:5432"
    volumes:
      - postgres-data-prod:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jarvis"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - jarvis-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  jarvis-redis:
    image: redis:7-alpine
    container_name: jarvis-redis-prod
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data-prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - jarvis-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  jarvis-neo4j:
    image: neo4j:5-community
    container_name: jarvis-neo4j-prod
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data-prod:/var/lib/neo4j/data
      - neo4j-logs-prod:/var/lib/neo4j/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - jarvis-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  jarvis-qdrant:
    image: qdrant/qdrant:latest
    container_name: jarvis-qdrant-prod
    environment:
      QDRANT_API_KEY: ${QDRANT_API_KEY}
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data-prod:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - jarvis-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  jarvis-prometheus:
    image: prom/prometheus:latest
    container_name: jarvis-prometheus-prod
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data-prod:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - jarvis-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  jarvis-grafana:
    image: grafana/grafana:latest
    container_name: jarvis-grafana-prod
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_SECURITY_ADMIN_USER: admin
      GF_USERS_ALLOW_SIGN_UP: false
    ports:
      - "3100:3000"
    volumes:
      - grafana-data-prod:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - jarvis-prometheus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - jarvis-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  jarvis-backend:
    image: jarvis-backend:latest
    container_name: jarvis-backend-prod
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://jarvis:${DATABASE_PASSWORD}@jarvis-postgres:5432/jarvis
      REDIS_URL: redis://jarvis-redis:6379
      NEO4J_URI: neo4j://jarvis-neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      QDRANT_URL: http://jarvis-qdrant:6333
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "3000:3000"
    depends_on:
      - jarvis-postgres
      - jarvis-redis
      - jarvis-neo4j
    networks:
      - jarvis-network
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '2'
          memory: 2G

  jarvis-gateway:
    image: jarvis-gateway:latest
    container_name: jarvis-gateway-prod
    environment:
      NODE_ENV: production
      PORT: 3001
      BACKEND_URL: http://jarvis-backend:3000
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "3001:3001"
    depends_on:
      - jarvis-backend
    networks:
      - jarvis-network
    restart: always
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 1G

  jarvis-ui:
    image: jarvis-ui:latest
    container_name: jarvis-ui-prod
    environment:
      NODE_ENV: production
      VITE_API_URL: https://${API_DOMAIN:-localhost}/api
      VITE_WS_URL: wss://${API_DOMAIN:-localhost}/ws
    ports:
      - "5173:5173"
    depends_on:
      - jarvis-gateway
    networks:
      - jarvis-network
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

networks:
  jarvis-network:
    driver: bridge

volumes:
  postgres-data-prod:
  redis-data-prod:
  neo4j-data-prod:
  neo4j-logs-prod:
  qdrant-data-prod:
  prometheus-data-prod:
  grafana-data-prod:

# Electron AAOS Migration Configuration
# Story 2.14 - Migration Script v2.0 → v2.1

version: "1.0.0"
story: "2.14"

# Supported migration paths
migrations:
  - from: "2.0"
    to: "2.1"
    description: "Migrate from flat to modular structure"
    status: "supported"

# Backup configuration
backup:
  prefix: ".electron-aaos-backup-"
  format: "YYYY-MM-DD"
  include:
    - ".electron-aaos-core/**"
    - "electron-aaos.config.js"
    - "electron-aaos.config.json"
    - ".electron-aaos/config.yaml"
    - ".mcp.json"
  exclude:
    - "node_modules/**"
    - ".git/**"
    - "*.log"
  verification:
    algorithm: "md5"
    parallel: true

# Module configuration for v2.1
modules:
  core:
    description: "Core framework utilities and runtime"
    directories:
      - registry
      - quality-gates
      - manifest
      - utils
      - elicitation
      - session
      - config
      - mcp
      - data
      - docs
  development:
    description: "Development tools and workflows"
    directories:
      - agents
      - tasks
      - templates
      - checklists
      - scripts
      - personas
  product:
    description: "Product interfaces and APIs"
    directories:
      - cli
      - api
  infrastructure:
    description: "Infrastructure and deployment"
    directories:
      - hooks
      - telemetry
      - integrations

# Validation settings
validation:
  structure: true
  imports: true
  lint: true
  tests: true
  timeout:
    lint: 60000      # 1 minute
    tests: 300000    # 5 minutes

# Safety settings
safety:
  requireBackup: true
  verifyBackup: true
  confirmBeforeExecute: true
  atomicOperations: true

    air: 3  # Aquarius (dev), Libra (po), Gemini (data-engineer)
    water: 3  # Pisces (sm), Scorpio (analyst), Cancer (ux-design-expert)
  by_color:
    cyan: 3  # dev, sm, electron-aaos-master
    green: 3  # qa, ux-design-expert, devops
    yellow: 2  # po, data-engineer
    red: 1  # analyst
    gray: 1  # pm
    magenta: 1  # architect
    blue: 1  # docs
  by_function:
    development: 2  # dev, devops
    quality: 2  # qa, ux-design-expert
    management: 3  # po, pm, sm
